# Local development infra for AxisQuant.
# Run from repo root:  docker compose -f infra/docker-compose.yml up -d
#
# - Postgres 16 on :5432  (db: axisquant, user/pass: axisquant)
# - Redis 7 on :6379

services:
  postgres:
    image: postgres:16-alpine
    container_name: axisquant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: axisquant
      POSTGRES_USER: axisquant
      POSTGRES_PASSWORD: axisquant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axisquant -d axisquant"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: axisquant-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
